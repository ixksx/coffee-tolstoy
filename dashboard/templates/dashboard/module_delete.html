{% extends "base.html" %}
{% block title %}Удалить модуль{% endblock %}
{% block content %}
<div class="container container-narrow">
    <div class="confirm-card">
        <h1 class="page-title">Удалить модуль?</h1>
        <p class="confirm-text">Вы уверены, что хотите удалить модуль <strong>«{{ module.name }}»</strong>?</p>
        <p class="confirm-warning">Все уроки и тесты модуля будут удалены.</p>
        <form method="post" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'dashboard:module_edit' module.id %}" class="btn btn-outline">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
