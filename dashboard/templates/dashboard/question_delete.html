{% extends "base.html" %}
{% block title %}Удалить вопрос{% endblock %}
{% block content %}
<div class="container container-narrow">
    <div class="confirm-card">
        <h1 class="page-title">Удалить вопрос?</h1>
        <p class="confirm-text">{{ question.text }}</p>
        <form method="post" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'dashboard:test_edit' question.test.module.id %}" class="btn btn-outline">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
