{% extends "base.html" %}
{% block title %}Удалить урок{% endblock %}
{% block content %}
<div class="container container-narrow">
    <div class="confirm-card">
        <h1 class="page-title">Удалить урок?</h1>
        <p class="confirm-text">Вы уверены, что хотите удалить урок <strong>«{{ lesson.title }}»</strong>?</p>
        <form method="post" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'dashboard:module_edit' lesson.module.id %}" class="btn btn-outline">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
