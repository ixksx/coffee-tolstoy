{% extends "base.html" %}
{% load static %}

{% block title %}Новый урок – {{ module.name }}{% endblock %}

{% block content %}
<div class="container container-narrow">
    <div class="arrow-block">
        <a href="{% url 'dashboard:module_edit' module.id %}" class="back-link"><img src="{% static "images/arrow-left.svg" %}" class="icon-img"> Назад к модулю</a>
    </div>
    
    <h1 class="page-title">Новый урок для «{{ module.name }}»</h1>

    <form method="post" enctype="multipart/form-data" class="edit-form">
        {% csrf_token %}
        <div class="form-group form-group-sm">
            <label class="form-label">Номер урока</label>
            <input type="number" name="number" class="form-input" value="1" required>
        </div>
        <div class="form-group">
            <label class="form-label">Название</label>
            <input type="text" name="title" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Изображение</label>
            <input type="file" name="image" class="form-file" accept="image/*">
        </div>
        <div class="form-group">
            <label class="form-label">Материал урока</label>
            <textarea name="content" class="form-textarea" rows="10" required></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Практическое задание (необязательно)</label>
            <textarea name="practice_task" class="form-textarea" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Файлы-инструкции (можно несколько)</label>
            <input type="file" name="files" class="form-file" multiple>
        </div>
        <div class="form-group">
            <label class="form-label">Дополнительные изображения</label>
            <input type="file" name="extra_images" class="form-file" multiple accept="image/*">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{% url 'dashboard:module_edit' module.id %}" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
