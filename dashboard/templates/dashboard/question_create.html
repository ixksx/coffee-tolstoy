
{% extends "base.html" %}
{% load static %}

{% block title %}Новый вопрос – {{ test.title }}{% endblock %}

{% block content %}
<div class="container container-narrow">
    <div class="arrow-block">
        <a href="{% url 'dashboard:test_edit' test.module.id %}" class="back-link"><img src="{% static "images/arrow-left.svg" %}" class="icon-img"> Назад к тесту</a>
    </div>
    
    <h1 class="page-title">Новый вопрос</h1>

    <form method="post" class="edit-form">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Текст вопроса</label>
            <textarea name="text" class="form-textarea" rows="3" required></textarea>
        </div>
        <div class="form-group form-group-sm">
            <label class="form-label">Порядок</label>
            <input type="number" name="order" class="form-input" value="0">
        </div>

        <h3 class="subsection-title">Варианты ответов</h3>
        <p class="form-hint">Отметьте правильные ответы галочкой</p>
        {% for i in "123456" %}
        <div class="answer-input-group">
            <input type="checkbox" name="correct_{{ i }}" class="answer-checkbox">
            <input type="text" name="answer_{{ i }}" class="form-input" placeholder="Вариант {{ i }}">
        </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{% url 'dashboard:test_edit' test.module.id %}" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
